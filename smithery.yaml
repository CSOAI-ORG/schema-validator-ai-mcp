name: schema-validator-ai-mcp
description: Schema Validator Ai automation via MCP. Includes validate json schema,
  generate schema, convert openapi. By MEOK AI Labs.
version: 1.0.0
tools:
- name: validate_json_schema
  description: Validate JSON data against a JSON Schema.
  parameters:
  - name: data_json
    type: string
    required: true
  - name: schema_json
    type: string
    required: true
- name: generate_schema
  description: Generate a JSON Schema from example JSON data.
  parameters:
  - name: data_json
    type: string
    required: true
  - name: title
    type: string
    required: false
- name: convert_openapi
  description: Extract and convert schemas from an OpenAPI specification.
  parameters:
  - name: openapi_json
    type: string
    required: true
  - name: extract_schemas
    type: boolean
    required: false
- name: validate_types
  description: Validate that JSON data fields match expected types.
  parameters:
  - name: data_json
    type: string
    required: true
  - name: type_spec
    type: object
    required: true
startCommand:
  type: stdio
  configSchema:
    type: object
    required:
    - apiKey
    properties:
      apiKey:
        type: string
        description: Your MEOK API Key
  commandFunction: "(config) => ({\n  command: 'uvx',\n  args: ['schema-validator-ai-mcp',\
    \ '--api-key', config.apiKey],\n  env: {\n    MEOK_API_KEY: config.apiKey\n  }\n\
    })"
